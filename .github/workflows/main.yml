name: Build and Release App

on:
    workflow_dispatch:

jobs:
    release:
        runs-on: macos-26

        steps:
            - name: Checkout code
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: Xcode Select Version
              uses: maxim-lobanov/setup-xcode@v1
              with:
                  xcode-version: "26.3.0"

            - name: Fetch Signing Assets
              uses: castdrian/setup-apple-certificate@main
              id: cert
              with:
                  app-store-connect-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
                  app-store-connect-issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
                  app-store-connect-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
                  distribution-private-key: ${{ secrets.DISTRIBUTION_PRIVATE_KEY_BASE64 }}
                  bundle-identifier: dev.adrian.vbound
                  certificate-type: DEVELOPER_ID

            - name: Install Signing Assets
              uses: maui-actions/apple-provisioning@v4
              with:
                  certificate: ${{ steps.cert.outputs.p12-certificate-base64 }}
                  certificate-passphrase: ${{ steps.cert.outputs.p12-password }}
                  bundle-identifiers: dev.adrian.vbound
                  profile-types: MAC_APP_DIRECT
                  app-store-connect-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
                  app-store-connect-issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
                  app-store-connect-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}

            - name: Build macOS app
              run: |
                  xcodebuild archive -scheme "vbound" -configuration "Release" -archivePath "build/vbound.xcarchive" -destination "generic/platform=macOS,name=Any Mac" CODE_SIGN_IDENTITY="${{ steps.cert.outputs.codesign-identity }}" | xcbeautify

            # - name: Notarize and package app
