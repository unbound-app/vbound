name: Build and Release App

on:
    workflow_dispatch:
    workflow_call:

jobs:
    release:
        runs-on: macos-26
        permissions:
            contents: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: Read version
              id: version
              run: |
                  VERSION=$(grep -m1 'MARKETING_VERSION' vbound.xcodeproj/project.pbxproj | tr -d ' ;' | cut -d= -f2)
                  echo "value=$VERSION" >> "$GITHUB_OUTPUT"

            - name: Xcode Select Version
              uses: maxim-lobanov/setup-xcode@v1
              with:
                  xcode-version: latest

            - name: Fetch Signing Assets
              uses: castdrian/setup-apple-certificate@main
              id: cert
              with:
                  app-store-connect-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
                  app-store-connect-issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
                  app-store-connect-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
                  distribution-private-key: ${{ secrets.DISTRIBUTION_PRIVATE_KEY_BASE64 }}
                  bundle-identifier: dev.adrian.vbound
                  certificate-type: DEVELOPER_ID

            - name: Install Signing Assets
              uses: apple-actions/import-codesign-certs@v2
              with:
                  p12-file-base64: ${{ steps.cert.outputs.p12-certificate-base64 }}
                  p12-password: ${{ steps.cert.outputs.p12-password }}

            - name: Archive app
              run: |
                  xcodebuild archive \
                    -scheme "vbound" \
                    -configuration "Release" \
                    -archivePath "build/vbound.xcarchive" \
                    -destination "generic/platform=macOS,name=Any Mac" \
                    CODE_SIGN_STYLE=Manual \
                    CODE_SIGN_IDENTITY="${{ steps.cert.outputs.codesign-identity }}" \
                    PROVISIONING_PROFILE_SPECIFIER="" \
                    | xcbeautify

            - name: Export app
              run: |
                  xcodebuild -exportArchive \
                    -archivePath "build/vbound.xcarchive" \
                    -exportOptionsPlist "ExportOptions.plist" \
                    -exportPath "build/export" \
                    | xcbeautify

            - name: Notarize and staple app
              run: |
                  echo "${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}" | base64 --decode > /tmp/notary_key.p8

                  /usr/bin/ditto -c -k --keepParent "build/export/vbound.app" "build/vbound-notarize.zip"

                  xcrun notarytool submit "build/vbound-notarize.zip" \
                    --key /tmp/notary_key.p8 \
                    --key-id "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
                    --issuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
                    --wait

                  xcrun stapler staple "build/export/vbound.app"

                  rm /tmp/notary_key.p8

            - name: Package app
              run: |
                  /usr/bin/ditto -c -k --keepParent "build/export/vbound.app" "build/vbound-${{ steps.version.outputs.value }}.zip"

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.version.outputs.value }}
                  generate_release_notes: true
                  files: build/vbound-${{ steps.version.outputs.value }}.zip
                  fail_on_unmatched_files: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
